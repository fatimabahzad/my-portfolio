<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Cowgirl | Fatemah Bahzad</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: Arial, sans-serif;
        background: #0a0015;
        color: #e0e0e0;
        overflow-x: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background:
          radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, #0d0a2e 0%, transparent 50%),
          #0a0015;
      }

      .stars::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(1px 1px at 10% 15%, white, transparent),
          radial-gradient(1px 1px at 25% 40%, white, transparent),
          radial-gradient(1px 1px at 40% 10%, white, transparent),
          radial-gradient(1px 1px at 55% 60%, white, transparent),
          radial-gradient(1px 1px at 70% 25%, white, transparent),
          radial-gradient(1px 1px at 85% 75%, white, transparent),
          radial-gradient(1px 1px at 15% 70%, white, transparent),
          radial-gradient(1px 1px at 30% 85%, white, transparent),
          radial-gradient(1px 1px at 45% 50%, white, transparent),
          radial-gradient(1px 1px at 60% 35%, white, transparent),
          radial-gradient(1px 1px at 75% 90%, white, transparent),
          radial-gradient(1px 1px at 90% 45%, white, transparent),
          radial-gradient(2px 2px at 5% 30%, #c084fc, transparent),
          radial-gradient(2px 2px at 50% 80%, #c084fc, transparent),
          radial-gradient(2px 2px at 95% 10%, #c084fc, transparent),
          radial-gradient(1.5px 1.5px at 35% 20%, #a78bfa, transparent),
          radial-gradient(1.5px 1.5px at 65% 55%, #a78bfa, transparent),
          radial-gradient(1px 1px at 20% 95%, white, transparent),
          radial-gradient(1px 1px at 80% 5%, white, transparent),
          radial-gradient(1px 1px at 48% 42%, white, transparent);
        animation: twinkle 4s infinite alternate;
      }

      .stars::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(1px 1px at 8% 55%, white, transparent),
          radial-gradient(1px 1px at 22% 12%, white, transparent),
          radial-gradient(1px 1px at 38% 78%, white, transparent),
          radial-gradient(1px 1px at 52% 22%, white, transparent),
          radial-gradient(1px 1px at 68% 68%, white, transparent),
          radial-gradient(1px 1px at 82% 38%, white, transparent),
          radial-gradient(2px 2px at 18% 48%, #e0c3fc, transparent),
          radial-gradient(2px 2px at 72% 15%, #e0c3fc, transparent),
          radial-gradient(1px 1px at 92% 82%, white, transparent),
          radial-gradient(1px 1px at 3% 88%, white, transparent);
        animation: twinkle 6s infinite alternate-reverse;
      }

      @keyframes twinkle {
        0% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      main {
        max-width: 900px;
        margin: auto;
        padding: 3rem 2rem;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: #a0a0a0;
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 2rem;
        transition: color 0.2s;
      }
      .back-link:hover { color: #c084fc; }

      .project-hero { margin-bottom: 2rem; }

      .project-hero h1 {
        font-size: 2.5rem;
        color: white;
        margin-bottom: 0.5rem;
      }

      .project-hero p.tagline {
        color: #c084fc;
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .video-wrapper {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #2a2a2a;
        margin-bottom: 2.5rem;
      }

      .video-wrapper video {
        width: 100%;
        display: block;
      }

      .project-section { margin-bottom: 2rem; }

      .project-section h2 {
        font-size: 1.3rem;
        color: white;
        border-left: 4px solid #c084fc;
        padding-left: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .project-section p {
        color: #a0a0a0;
        line-height: 1.75;
        font-size: 0.97rem;
      }

      .tech-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .tech-tag {
        background: #1e1e1e;
        border: 1px solid #c084fc;
        color: #c084fc;
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        font-size: 0.82rem;
      }

      .feature-list {
        list-style: none;
        padding: 0;
        margin-top: 0.75rem;
       }
